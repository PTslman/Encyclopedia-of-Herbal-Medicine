<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>غير متصل - موسوعة الأعشاب الطبية</title>
    <meta name="theme-color" content="#2e7d32">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            animation: bounce 0.8s ease-out;
        }
        
        @keyframes bounce {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .offline-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
        }
        
        h1 {
            color: #fff9e0;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 800;
        }
        
        p {
            color: rgba(255,249,224,0.9);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .offline-message {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .offline-message ul {
            text-align: right;
            padding-right: 20px;
            margin: 15px 0;
        }
        
        .offline-message li {
            margin: 8px 0;
            color: #ffecb3;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        button {
            background: #ffd700;
            color: #1b5e20;
            border: none;
            padding: 14px 25px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #ffd700;
            border: 1px solid #ffd700;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .cached-data {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .cached-data i {
            margin-left: 8px;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(255,249,224,0.5);
        }
        
        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
            }
            button {
                justify-content: center;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ffecb3;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect width="100" height="100" rx="22" fill="url(#iconGrad)"/>
                <text x="50" y="65" font-size="48" text-anchor="middle" fill="#2e7d32">📡</text>
                <text x="50" y="85" font-size="11" text-anchor="middle" fill="#1b5e20" font-weight="bold">غير متصل</text>
            </svg>
        </div>
        
        <h1>🌿 لا يوجد اتصال بالإنترنت</h1>
        
        <div class="offline-message">
            <p>⚠️ عذراً، لا يمكن الاتصال بالإنترنت حالياً.</p>
            <p>💡 يمكنك الاستمرار باستخدام:</p>
            <ul>
                <li>📚 عرض الأعشاب التي تم تحميلها سابقاً</li>
                <li>🔍 البحث في البيانات المخزنة محلياً</li>
                <li>📖 تصفح التصنيفات المحفوظة</li>
            </ul>
        </div>
        
        <div class="cached-data" id="cachedInfo">
            <i class="fas fa-spinner fa-pulse"></i> جاري التحقق من البيانات المخزنة...
        </div>
        
        <div class="button-group">
            <button onclick="goToApp()">
                <i class="fas fa-home"></i> العودة للتطبيق
            </button>
            <button class="btn-secondary" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> إعادة المحاولة
            </button>
        </div>
        
        <div class="footer">
            <i class="fas fa-leaf"></i> موسوعة الأعشاب الطبية - الإصدار 4.0
        </div>
    </div>
    
    <script>
        // عرض معلومات البيانات المخزنة
        function showCachedInfo() {
            const cachedDiv = document.getElementById('cachedInfo');
            if (!cachedDiv) return;
            
            try {
                // محاولة قراءة الكاش من localStorage
                const cacheData = localStorage.getItem('herbal_cache_v2');
                if (cacheData) {
                    const data = JSON.parse(cacheData);
                    const herbsCount = data.herbs?.length || 0;
                    const categoriesCount = data.categories?.length || 0;
                    const lastUpdate = data.timestamp ? new Date(data.timestamp).toLocaleString('ar-EG') : 'غير معروف';
                    
                    cachedDiv.innerHTML = `
                        <i class="fas fa-database"></i> البيانات المخزنة محلياً:<br>
                        🌿 ${herbsCount} عشبة | 📂 ${categoriesCount} تصنيف<br>
                        📅 آخر تحديث: ${lastUpdate}
                    `;
                } else {
                    cachedDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ لا توجد بيانات مخزنة محلياً. يرجى الاتصال بالإنترنت لتحميل البيانات.';
                }
            } catch(e) {
                console.error('خطأ في قراءة الكاش:', e);
                cachedDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ لا توجد بيانات مخزنة محلياً';
            }
        }
        
        // العودة إلى التطبيق
        function goToApp() {
            // محاولة العودة إلى التطبيق
            if (window.matchMedia('(display-mode: standalone)').matches) {
                // إذا كان التطبيق مثبتاً
                window.location.href = '/Encyclopedia-of-Herbal-Medicine/';
            } else {
                window.location.href = '/Encyclopedia-of-Herbal-Medicine/';
            }
        }
        
        // عرض المعلومات عند تحميل الصفحة
        showCachedInfo();
        
        // محاولة الكشف عن عودة الإنترنت تلقائياً
        window.addEventListener('online', () => {
            console.log('🟢 تم استعادة الاتصال');
            const cachedDiv = document.getElementById('cachedInfo');
            if (cachedDiv) {
                cachedDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ تم استعادة الاتصال! جاري إعادة التوجيه...';
                cachedDiv.style.background = 'rgba(76,175,80,0.3)';
            }
            setTimeout(() => {
                window.location.href = '/Encyclopedia-of-Herbal-Medicine/';
            }, 1500);
        });
        
        console.log('📱 صفحة offline.html تم تحميلها بنجاح');
    </script>
</body>
</html>
